.app{max-width:720px;margin:0 auto;padding-bottom:60px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}

.bt{background:#d1fae5;color:#065f46}.ba{background:#fef3c7;color:#78350f}

  "대조·대비": ["대조적심상","대조(조정질투↔백성신망)","대조(고침상↔도화)","대조(날잊고↔남향한)","대조(자연↔인간)","대조적상황","대비(청각↔시각)","색채대비(흰↔푸른)"],
  "반복·강조": ["반복","유사시구반복","열거","중장나열(장형화)","영탄","음성상징어(굽이굽이)","음성상징어"],
  "인용·고사": ["직접인용","인용(귀거래사)","고사인용","차용(정과정)"],
  "설의·문답": ["설의","대화형식(문답법)","자문자답"],
  "화자의 정서": ["영탄","예찬적","예찬","고려유신","도교적색채"],
  "발상·모티프": ["기발한발상","변신모티프","해학적발상"],
  "시상 구조": ["분연체","독립시상","시간의흐름","대구","돈호법","의인(대나무)","대유법"],
};

function sh(a){return[...a].sort(()=>Math.random()-.5)}
function rnd(a){return a.length?a[Math.floor(Math.random()*a.length)]:null}

/* ── 퀴즈 유형 정의 ── */
const QTYPES=[
  {id:"qt1",label:"작품 → 주제",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const wr=sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>x.subject);if(wr.length<3)return null;
    return{q:`<b>${w.title}</b> (${w.author})의 주제는?`,ans:w.subject,opts:sh([w.subject,...wr]),ex:`${w.title}의 주제: ${w.subject}`,wid:w.id};
  }},
  {id:"qt2",label:"주제 → 작품",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>`${x.title} (${x.author})`);if(wr.length<3)return null;
    return{q:`주제 <i>"${w.subject}"</i>에 해당하는 작품은?`,ans:c,opts:sh([c,...wr]),ex:`정답: ${w.title} by ${w.author}`,wid:w.id};
  }},
  {id:"qt3",label:"소재 → 작품",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const kw=w.keywords[Math.floor(Math.random()*w.keywords.length)];
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>`${x.title} (${x.author})`);if(wr.length<3)return null;
    return{q:`핵심 소재 <b>'${kw.k}'</b>가 등장하는 작품은?<br><small style="color:#666">${kw.v}</small>`,ans:c,opts:sh([c,...wr]),ex:`'${kw.k}'는 ${w.title} (${w.author})에 등장합니다.`,wid:w.id};
  }},
  {id:"qt4",label:"소재 → 의미",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const kw=w.keywords[Math.floor(Math.random()*w.keywords.length)];
    const all=W.flatMap(x=>x.keywords).filter(k=>k.k!==kw.k);
    const wr=sh(all).slice(0,3).map(k=>k.v);if(wr.length<3)return null;
    return{q:`<b>${w.title}</b>에서 <b>'${kw.k}'</b>의 의미는?`,ans:kw.v,opts:sh([kw.v,...wr]),ex:`'${kw.k}'의 의미: ${kw.v}`,wid:w.id};
  }},
  {id:"qt5",label:"태그 → 작품",cat:"표현",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const tag=w.tags[Math.floor(Math.random()*w.tags.length)];
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id&&!x.tags.includes(tag))).slice(0,3).map(x=>`${x.title} (${x.author})`);if(wr.length<3)return null;
    return{q:`표현 기법 <b>#${tag}</b>이(가) 사용된 작품은?`,ans:c,opts:sh([c,...wr]),ex:`#${tag} 기법: ${w.title} (${w.author})`,wid:w.id};
  }},
  {id:"qt6",label:"갈래 → 작품",cat:"기본",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id&&x.type!==w.type)).slice(0,3).map(x=>`${x.title} (${x.author})`);
    const fw=wr.length>=3?wr:sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>`${x.title} (${x.author})`);
    if(fw.length<3)return null;
    return{q:`갈래가 <b>'${w.type}'</b>인 작품은?`,ans:c,opts:sh([c,...fw]),ex:`${w.title}의 갈래: ${w.type}`,wid:w.id};
  }},
  {id:"qt7",label:"작가 → 작품",cat:"기본",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const wr=sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>x.title);if(wr.length<3)return null;
    return{q:`<b>${w.author}</b>이(가) 지은 작품은?`,ans:w.title,opts:sh([w.title,...wr]),ex:`${w.author}의 작품: ${w.title}`,wid:w.id};
  }},
  {id:"qt8",label:"작품 → 작가",cat:"기본",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const all=[...new Set(W.map(x=>x.author))];
    const wr=sh(all.filter(a=>a!==w.author)).slice(0,3);if(wr.length<3)return null;
    return{q:`<b>${w.title}</b>의 작가는?`,ans:w.author,opts:sh([w.author,...wr]),ex:`${w.title}의 작가: ${w.author}`,wid:w.id};
  }},
  {id:"qt9",label:"작품 → 갈래",cat:"기본",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const all=[...new Set(W.map(x=>x.type))];
    const wr=sh(all.filter(t=>t!==w.type)).slice(0,3);if(wr.length<3)return null;
    return{q:`<b>${w.title}</b> (${w.author})의 갈래는?`,ans:w.type,opts:sh([w.type,...wr]),ex:`${w.title}의 갈래: ${w.type}`,wid:w.id};
  }},
  {id:"qt10",label:"구성 → 작품",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const st=w.st[Math.floor(Math.random()*w.st.length)];
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id)).slice(0,3).map(x=>`${x.title} (${x.author})`);if(wr.length<3)return null;
    return{q:`<b>${st.l}</b>에서 <i>"${st.d}"</i>가 나타나는 작품은?`,ans:c,opts:sh([c,...wr]),ex:`${w.title} — ${st.l}: ${st.d}`,wid:w.id};
  }},
  {id:"qt11",label:"정서·태도 → 작품",cat:"이해",gen(pool){
    const w=rnd(pool);if(!w)return null;
    const theme=w.themes[Math.floor(Math.random()*w.themes.length)];
    const c=`${w.title} (${w.author})`;
    const wr=sh(W.filter(x=>x.id!==w.id&&!x.themes.includes(theme))).slice(0,3).map(x=>`${x.title} (${x.author})`);if(wr.length<3)return null;
    return{q:`화자의 정서·태도가 <b>'${theme}'</b>에 해당하는 작품은?`,ans:c,opts:sh([c,...wr]),ex:`'${theme}' 정서: ${w.title} (${w.author})`,wid:w.id};
  }}
];

/* ── 퀴즈 상태 ── */
let selectedTypes = new Set(QTYPES.map(t=>t.id)); // 처음엔 전체 선택
let QS={pool:[],round:1,answered:null,cur:null,correct:0,total:0};
let activeSetB="전체";
let flashIdx=0;let flashFlip=false;

function switchTab(t){
  ["browse","flash","quiz","tag"].forEach(n=>document.getElementById("tab-"+n).style.display=n===t?"block":"none");
  document.querySelectorAll("#tabs .tab").forEach((el,i)=>el.classList.toggle("active",["browse","flash","quiz","tag"][i]===t));
  if(t==="browse")renderBrowse();
  if(t==="flash")renderFlash();
  if(t==="quiz")renderQuiz();
  if(t==="tag")renderTag();
}

/* ═══ 작품 목록 ═══ */
function renderBrowse(){
  const sets=["전체","Set 1","Set 2","Set 3","Set 4","Set 5"];
  let h=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">`;
  sets.forEach(s=>h+=`<button class="tab${s===activeSetB?" active":""}" onclick="activeSetB='${s}';renderBrowse()">${s}</button>`);
  h+=`</div><input type="text" id="bs" placeholder="작품명, 작가, 주제, 태그 검색..." oninput="renderBrowseList()"/><div id="bl"></div>`;
  document.getElementById("tab-browse").innerHTML=h;
  renderBrowseList();
}
function renderBrowseList(){
  const q=(document.getElementById("bs")?.value||"").trim().toLowerCase();
  const ws=(activeSetB==="전체"?W:W.filter(w=>w.set===activeSetB)).filter(w=>!q||w.title.includes(q)||w.author.includes(q)||w.subject.includes(q)||w.tags.some(t=>t.includes(q)));
  let h="";
  ws.forEach(w=>{
    h+=`<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <div><div style="font-size:15px;font-weight:700;margin-bottom:4px">${w.title}</div><div style="font-size:13px;color:#666;margin-bottom:10px">${w.author} · ${w.type}</div></div>
        <span class="badge ${w.bc}">${w.set}</span>
      </div>
      <div class="sl">주제</div><div style="font-size:13px;line-height:1.6;margin-bottom:8px">${w.subject}</div>
      <div class="sl">핵심 소재</div><div style="font-size:13px;color:#555;line-height:1.7;margin-bottom:8px">${w.keywords.map(k=>`<b style="color:#1a1a1a">${k.k}</b> — ${k.v}`).join("<br>")}</div>
      <div class="sl">구성</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${w.st.map(s=>`<span class="badge bb">${s.l}</span><span style="font-size:12px;color:#666;margin-right:6px">${s.d}</span>`).join("")}</div>
      <div class="tw">${w.tags.map(t=>`<button class="tag-chip" onclick="goTagSearch('${t.replace(/'/g,"\\'")}')">#${t}</button>`).join("")}</div>
    </div>`;
  });
  document.getElementById("bl").innerHTML=h||`<div style="color:#aaa;font-size:14px;padding:2rem 0;text-align:center">검색 결과 없음</div>`;
}
function goTagSearch(tag){switchTab('tag');setTimeout(()=>renderTagDetail(tag),50);}

/* ═══ 플래시카드 ═══ */

/* ═══ 매칭 퀴즈 ═══ */
function nextQ(){
  if(QS.pool.length===0){QS.pool=sh([...W]);QS.round++;}
  const active=QTYPES.filter(t=>selectedTypes.has(t.id));
  if(!active.length)return false;
  let q=null,tries=0;
  while(!q&&tries<50){const t=active[Math.floor(Math.random()*active.length)];const r=t.gen(QS.pool);if(r){q=r;q.label=t.label;}tries++;}
  if(!q)return false;
  QS.cur=q;QS.answered=null;return true;
}

function renderQuiz(){
  const el=document.getElementById("tab-quiz");
  if(!QS.cur){
    renderQuizSetup();
    return;
  }
  const q=QS.cur;
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div class="info" style="margin-bottom:0;flex:1">라운드 ${QS.round} &nbsp;·&nbsp; 남은 작품 <b>${QS.pool.length}</b>/${W.length} &nbsp;·&nbsp; 정답 <b style="color:#065f46">${QS.correct}</b>/${QS.total}</div>
    <button class="btn" onclick="QS.cur=null;renderQuiz()" style="font-size:12px;padding:6px 12px">유형 설정</button>
  </div>
  <div style="margin-bottom:10px"><span class="badge bp">${q.label}</span></div>
  <div class="card">
    <div style="font-size:15px;margin-bottom:14px;line-height:1.7">${q.q}</div>`;
  q.opts.forEach(opt=>{
    let cls="qo";
    if(QS.answered!==null){if(opt===q.ans)cls+=" ok";else if(opt===QS.answered)cls+=" ng";}
    h+=`<button class="${cls}" onclick="answerQ(this)" data-opt="${opt.replace(/"/g,'&quot;')}" ${QS.answered!==null?"disabled":""}>${opt}</button>`;
  });
  if(QS.answered!==null){
    const ok=QS.answered===q.ans;
    h+=`<div class="${ok?'result-ok':'result-ng'}">${ok?"✓ 정답! ":"✗ 오답. "}${q.ex}</div>`;
  }
  h+=`</div>`;
  if(QS.answered!==null){
    h+=`<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btnp" onclick="goNext()">다음 문제 →</button>
      <button class="btn" onclick="QS={pool:[],round:1,answered:null,cur:null,correct:0,total:0};renderQuiz()" style="margin-left:auto">처음으로</button>
    </div>`;
  }
  el.innerHTML=h;
}

function renderQuizSetup(){
  const cats=["기본","이해","표현"];
  const catLabel={"기본":"📋 기본 정보","이해":"💡 작품 이해","표현":"✏️ 표현 기법"};
  const selCount=selectedTypes.size;
  let h=`<div class="card" style="padding:20px">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">문제 유형 선택</div>
    <div style="font-size:13px;color:#666;margin-bottom:16px">선택된 유형 <b style="color:#1d4ed8">${selCount}</b> / ${QTYPES.length} &nbsp;·&nbsp; 맞춘 작품은 전체 소진 후 다음 라운드 재등장</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn" onclick="selectedTypes=new Set(QTYPES.map(t=>t.id));renderQuizSetup()">전체 선택</button>
      <button class="btn" onclick="selectedTypes=new Set();renderQuizSetup()">전체 해제</button>
      ${cats.map(c=>`<button class="btn" onclick="toggleCat('${c}')">${catLabel[c].split(" ").slice(1).join(" ")} 전체선택</button>`).join("")}
    </div>`;
  cats.forEach(cat=>{
    h+=`<div class="tag-group-label">${catLabel[cat]}</div>`;
    QTYPES.filter(t=>t.cat===cat).forEach(t=>{
      const on=selectedTypes.has(t.id);
      h+=`<div class="type-toggle${on?" selected":""}" onclick="toggleType('${t.id}')">
        <span style="font-size:14px">${t.label}</span>
        <div class="toggle-check${on?" on":""}">${on?"✓":""}</div>
      </div>`;
    });
  });
  h+=`</div>
  <div style="margin-top:16px">
    <button class="btn btnp" onclick="startQuiz()" ${selCount===0?"disabled":""} style="width:100%;padding:12px;font-size:14px">
      ${selCount===0?"유형을 1개 이상 선택하세요":QS.correct+QS.total>0?"이어서 풀기 →":"퀴즈 시작하기"}
    </button>
    ${QS.correct+QS.total>0?`<button class="btn btnd" onclick="QS={pool:sh([...W]),round:1,answered:null,cur:null,correct:0,total:0};startQuiz()" style="width:100%;padding:10px;font-size:13px;margin-top:8px">처음부터 다시 시작</button>`:""}
  </div>`;
  document.getElementById("tab-quiz").innerHTML=h;
}

function toggleType(id){
  if(selectedTypes.has(id))selectedTypes.delete(id);else selectedTypes.add(id);
  renderQuizSetup();
}
function toggleCat(cat){
  const ids=QTYPES.filter(t=>t.cat===cat).map(t=>t.id);
  const allOn=ids.every(id=>selectedTypes.has(id));
  ids.forEach(id=>allOn?selectedTypes.delete(id):selectedTypes.add(id));
  renderQuizSetup();
}
function startQuiz(){
  if(!QS.pool.length){QS.pool=sh([...W]);QS.round=1;QS.correct=0;QS.total=0;}
  nextQ();renderQuiz();
}
function answerQ(btn){
  if(QS.answered!==null)return;
  const opt=btn.dataset.opt;
  QS.answered=opt;QS.total++;
  if(opt===QS.cur.ans){QS.correct++;QS.pool=QS.pool.filter(w=>w.id!==QS.cur.wid);}
  renderQuiz();
}
function goNext(){nextQ();renderQuiz();}

/* ═══ 태그 탐색 ═══ */
let activeTagGroup="전체";
let activeTag=null;

function renderTag(){
  const allTags=[...new Set(W.flatMap(w=>w.tags))].sort();
  const groups=["전체",...Object.keys(TAG_GROUPS)];
  let h=`<div style="font-size:16px;font-weight:700;margin-bottom:12px">태그 탐색</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
  groups.forEach(g=>h+=`<button class="tab${g===activeTagGroup?" active":""}" onclick="activeTagGroup='${g}';renderTag()">${g}</button>`);
  h+=`</div>`;

  let showTags=allTags;
  if(activeTagGroup!=="전체"){
    showTags=(TAG_GROUPS[activeTagGroup]||[]).filter(t=>allTags.includes(t));
  }

  h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">`;
  showTags.forEach(t=>h+=`<button class="tag-chip${activeTag===t?" active":""}" onclick="renderTagDetail('${t.replace(/'/g,"\\'")}')">#${t}</button>`);
  h+=`</div><div id="tr">`;

  if(activeTag&&showTags.includes(activeTag)){
    h+=buildTagDetail(activeTag);
  } else {
    h+=`<div style="color:#aaa;font-size:14px">태그를 클릭하면 상세 정보가 표시됩니다</div>`;
  }
  h+=`</div>`;
  document.getElementById("tab-tag").innerHTML=h;
}

function renderTagDetail(tag){
  activeTag=tag;
  // 그룹 전환
  for(const [g,tags] of Object.entries(TAG_GROUPS)){
    if(tags.includes(tag)){activeTagGroup=g;break;}
  }
  renderTag();
  // 스크롤
  setTimeout(()=>{const el=document.getElementById("tr");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},80);
}

function buildTagDetail(tag){
  const works=W.filter(w=>w.tags.some(t=>t===tag));

  // 유사 태그: 같은 그룹 내 태그 + 공동 작품에 붙은 다른 태그
  let groupTags=[];
  for(const [g,tags] of Object.entries(TAG_GROUPS)){
    if(tags.includes(tag)){groupTags=tags.filter(t=>t!==tag&&[...new Set(W.flatMap(w=>w.tags))].includes(t));break;}
  }
  const coTags=[...new Set(works.flatMap(w=>w.tags).filter(t=>t!==tag&&!groupTags.includes(t)))];

  let h=`<div style="background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:20px;margin-bottom:12px">`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <span class="tag-chip active" style="font-size:13px;padding:5px 14px">#${tag}</span>
    <span style="font-size:13px;color:#888">${works.length}개 작품에서 사용</span>
  </div>`;

  // 같은 그룹 태그
  if(groupTags.length){
    h+=`<div class="sl">같은 유형의 기법 (${Object.keys(TAG_GROUPS).find(g=>TAG_GROUPS[g].includes(tag))||""})</div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">`;
    groupTags.forEach(t=>h+=`<button class="rel-tag" onclick="renderTagDetail('${t.replace(/'/g,"\\'")}')">#${t}</button>`);
    h+=`</div>`;
  }

  // 함께 자주 쓰인 태그
  if(coTags.length){
    h+=`<div class="sl">이 작품들에 함께 쓰인 태그</div>`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px">`;
    coTags.slice(0,10).forEach(t=>h+=`<button class="work-tag" onclick="renderTagDetail('${t.replace(/'/g,"\\'")}')">#${t}</button>`);
    h+=`</div>`;
  }
  h+=`</div>`;

  // 해당 작품들
  h+=`<div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#333">#${tag} 사용 작품</div>`;
  works.forEach(w=>{
    h+=`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <span class="badge ${w.bc}">${w.set}</span>
        <span style="font-size:14px;font-weight:700">${w.title}</span>
        <span style="font-size:13px;color:#666">— ${w.author} · ${w.type}</span>
      </div>
      <div style="font-size:13px;color:#555;margin-bottom:8px">${w.subject}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${w.tags.map(t=>`<button class="tag-chip${t===tag?" active":""}" onclick="renderTagDetail('${t.replace(/'/g,"\\'")}')">#${t}</button>`).join("")}
      </div>
    </div>`;
  });
  return h;
}

/* ── 초기화 ── */
renderBrowse();
</script>
